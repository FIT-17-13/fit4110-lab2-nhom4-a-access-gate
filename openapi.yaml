openapi: 3.1.0
info:
  title: Smart Campus Access Gate API
  version: 1.0.0
  description: |
    Contract for Pair 3: Core Business calls Access Gate to query access logs,
    gate status, and card information for audit and operational checks.
  contact:
    name: A3 Access Gate Team
    email: access-gate@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
  - url: https://api.campus.local
    description: Class network placeholder
tags:
  - name: health
    description: Service health checks
  - name: access-logs
    description: Access log queries
  - name: gates
    description: Gate status queries
  - name: cards
    description: Card information queries
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: getHealth
      summary: Check Access Gate service health
      description: Returns the current health status of the Access Gate API.
      tags: [health]
      security: []
      responses:
        '200':
          description: Access Gate service is running
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: access-gate
                    time: '2026-05-15T08:00:00Z'
  /access/logs/recent:
    get:
      operationId: listRecentAccessLogs
      summary: List recent access logs
      description: Core Business uses this endpoint to audit recent card swipe activity.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/FromTime'
        - $ref: '#/components/parameters/ToTime'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Recent access logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogList'
              examples:
                recentLogs:
                  value:
                    items:
                      - logId: log-001
                        cardId: card-001
                        gateId: gate-main
                        direction: IN
                        timestamp: '2026-05-15T08:00:00Z'
                        status: ALLOWED
                        operatorNote: null
                        event:
                          eventType: CARD_SWIPE
                          readerId: reader-main-in
                          cardId: card-001
                    nextCursor: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /access/logs/{logId}:
    get:
      operationId: getAccessLogById
      summary: Get one access log by id
      description: Core Business uses this endpoint to inspect one specific access log.
      tags: [access-logs]
      parameters:
        - $ref: '#/components/parameters/LogId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Access log detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLog'
              examples:
                allowed:
                  value:
                    logId: log-001
                    cardId: card-001
                    gateId: gate-main
                    direction: IN
                    timestamp: '2026-05-15T08:00:00Z'
                    status: ALLOWED
                    operatorNote: null
                    event:
                      eventType: CARD_SWIPE
                      readerId: reader-main-in
                      cardId: card-001
                manualOverride:
                  value:
                    logId: log-045
                    cardId: card-020
                    gateId: gate-lab-a
                    direction: IN
                    timestamp: '2026-05-15T10:42:00Z'
                    status: DENIED
                    operatorNote: Visitor used temporary ID check.
                    event:
                      eventType: MANUAL_OVERRIDE
                      operatorId: guard-001
                      reason: Card chip failed and identity was verified manually.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /gates/{gateId}/status:
    get:
      operationId: getGateStatus
      summary: Get current gate status
      description: Core Business uses this endpoint to check whether a gate is online, offline, or under maintenance.
      tags: [gates]
      parameters:
        - $ref: '#/components/parameters/GateId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Gate status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatus'
              examples:
                online:
                  value:
                    gateId: gate-main
                    status: ONLINE
                    lastHeartbeatAt: '2026-05-15T08:00:00Z'
                    maintenanceReason: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cards/{cardId}:
    get:
      operationId: getCardById
      summary: Get card information
      description: Core Business uses this endpoint to check the lifecycle state of a campus access card.
      tags: [cards]
      parameters:
        - $ref: '#/components/parameters/CardId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Card information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
              examples:
                active:
                  value:
                    cardId: card-001
                    holderId: student-001
                    status: ACTIVE
                    expiresAt: '2026-12-31T23:59:59Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    LogId:
      name: logId
      in: path
      required: true
      description: Access log identifier.
      schema:
        type: string
        pattern: '^log-[0-9]{3,}$'
      example: log-001
    GateId:
      name: gateId
      in: path
      required: true
      description: Gate identifier.
      schema:
        type: string
        pattern: '^gate-[a-z0-9-]+$'
      example: gate-main
    CardId:
      name: cardId
      in: path
      required: true
      description: Card identifier.
      schema:
        type: string
        pattern: '^card-[0-9]{3,}$'
      example: card-001
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of logs returned.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20
    FromTime:
      name: from
      in: query
      required: false
      description: Start time for filtering logs.
      schema:
        type: string
        format: date-time
      example: '2026-05-15T00:00:00Z'
    ToTime:
      name: to
      in: query
      required: false
      description: End time for filtering logs.
      schema:
        type: string
        format: date-time
      example: '2026-05-15T23:59:59Z'
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Request correlation id for tracing.
      schema:
        type: string
        minLength: 8
        maxLength: 100
      example: corr-20260515-0001
  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        service:
          type: string
          minLength: 2
          maxLength: 80
          example: access-gate
        time:
          type: string
          format: date-time
          example: '2026-05-15T08:00:00Z'
    AccessLogList:
      type: object
      additionalProperties: false
      required: [items, nextCursor]
      properties:
        items:
          type: array
          minItems: 0
          maxItems: 100
          items:
            $ref: '#/components/schemas/AccessLog'
        nextCursor:
          type: [string, 'null']
          minLength: 1
          maxLength: 200
          example: null
    AccessLog:
      type: object
      additionalProperties: false
      required: [logId, cardId, gateId, direction, timestamp, status, operatorNote, event]
      properties:
        logId:
          type: string
          pattern: '^log-[0-9]{3,}$'
          example: log-001
        cardId:
          type: string
          pattern: '^card-[0-9]{3,}$'
          example: card-001
        gateId:
          type: string
          pattern: '^gate-[a-z0-9-]+$'
          example: gate-main
        direction:
          type: string
          enum: [IN, OUT]
          example: IN
        timestamp:
          type: string
          format: date-time
          example: '2026-05-15T08:00:00Z'
        status:
          type: string
          enum: [ALLOWED, DENIED, ERROR]
          example: ALLOWED
        operatorNote:
          type: [string, 'null']
          maxLength: 300
          example: null
        event:
          $ref: '#/components/schemas/AccessEvent'
    GateStatus:
      type: object
      additionalProperties: false
      required: [gateId, status, lastHeartbeatAt, maintenanceReason]
      properties:
        gateId:
          type: string
          pattern: '^gate-[a-z0-9-]+$'
          example: gate-main
        status:
          type: string
          enum: [ONLINE, OFFLINE, MAINTENANCE]
          example: ONLINE
        lastHeartbeatAt:
          type: string
          format: date-time
          example: '2026-05-15T08:00:00Z'
        maintenanceReason:
          type: [string, 'null']
          maxLength: 300
          example: null
    Card:
      type: object
      additionalProperties: false
      required: [cardId, holderId, status, expiresAt]
      properties:
        cardId:
          type: string
          pattern: '^card-[0-9]{3,}$'
          example: card-001
        holderId:
          type: string
          minLength: 3
          maxLength: 80
          example: student-001
        status:
          type: string
          enum: [ACTIVE, BLOCKED, EXPIRED]
          example: ACTIVE
        expiresAt:
          type: string
          format: date-time
          example: '2026-12-31T23:59:59Z'
    AccessEvent:
      oneOf:
        - $ref: '#/components/schemas/CardSwipeEvent'
        - $ref: '#/components/schemas/ManualOverrideEvent'
      discriminator:
        propertyName: eventType
        mapping:
          CARD_SWIPE: '#/components/schemas/CardSwipeEvent'
          MANUAL_OVERRIDE: '#/components/schemas/ManualOverrideEvent'
    CardSwipeEvent:
      type: object
      additionalProperties: false
      required: [eventType, readerId, cardId]
      properties:
        eventType:
          type: string
          const: CARD_SWIPE
          example: CARD_SWIPE
        readerId:
          type: string
          minLength: 3
          maxLength: 80
          example: reader-main-in
        cardId:
          type: string
          pattern: '^card-[0-9]{3,}$'
          example: card-001
    ManualOverrideEvent:
      type: object
      additionalProperties: false
      required: [eventType, operatorId, reason]
      properties:
        eventType:
          type: string
          const: MANUAL_OVERRIDE
          example: MANUAL_OVERRIDE
        operatorId:
          type: string
          minLength: 3
          maxLength: 80
          example: guard-001
        reason:
          type: string
          minLength: 5
          maxLength: 300
          example: Visitor verified manually by security staff.
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, instance, correlationId]
      properties:
        type:
          type: string
          format: uri
          example: https://campus.local/errors/not-found
        title:
          type: string
          minLength: 3
          maxLength: 120
          example: Resource not found
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 404
        detail:
          type: [string, 'null']
          maxLength: 500
          example: Access log log-999 was not found.
        instance:
          type: [string, 'null']
          format: uri-reference
          example: /access/logs/log-999
        correlationId:
          type: string
          minLength: 8
          maxLength: 100
          example: corr-20260515-0001
  responses:
    BadRequest:
      description: Request parameters are invalid
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/validation
            title: Invalid request
            status: 400
            detail: limit must be between 1 and 100.
            instance: /access/logs/recent
            correlationId: corr-20260515-0001
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/unauthorized
            title: Unauthorized
            status: 401
            detail: Bearer token is required.
            instance: /access/logs/recent
            correlationId: corr-20260515-0002
    Forbidden:
      description: Caller does not have permission for this resource
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/forbidden
            title: Forbidden
            status: 403
            detail: Caller is not allowed to query this gate.
            instance: /gates/gate-main/status
            correlationId: corr-20260515-0003
    NotFound:
      description: Requested resource does not exist
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/not-found
            title: Resource not found
            status: 404
            detail: The requested resource was not found.
            instance: /access/logs/log-999
            correlationId: corr-20260515-0004
    InternalServerError:
      description: Unexpected Access Gate service error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
          example:
            type: https://campus.local/errors/internal
            title: Internal server error
            status: 500
            detail: Access Gate cannot read from the local log store.
            instance: /access/logs/recent
            correlationId: corr-20260515-0005
