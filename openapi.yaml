openapi: 3.1.0
info:
  title: Access Gate Integration API - Smart Campus
  version: 1.0.0
  description: |
    Hop dong API tich hop cho nhom A3 Access Gate.
    File nay gom hai luong REST sync chinh:
    - Pair 3: Core Business goi Access Gate de lay log, trang thai cong, thong tin the.
    - Pair 10: Access Gate goi Core Business de kiem tra quyen mo cong realtime.
  contact:
    name: A3 Access Gate Team
    email: access-gate@example.edu.vn
servers:
  - url: http://localhost:4010
    description: Prism mock server
tags:
  - name: pair-3-access-gate-provider
    description: Pair 3 - API do Access Gate cung cap cho Core Business.
  - name: pair-10-core-business-provider
    description: Pair 10 - API do Core Business cung cap de Access Gate goi kiem tra policy.
  - name: health
    description: Kiem tra trang thai service.
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [health]
      summary: Kiem tra trang thai service
      description: Endpoint health check dung cho mock va kiem tra ket noi ban dau.
      operationId: getHealth
      security: []
      responses:
        '200':
          description: Service dang hoat dong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
              examples:
                ok:
                  value:
                    status: ok
                    service: access-gate-integration
                    time: '2026-05-26T08:00:00Z'
  /access/logs/recent:
    get:
      tags: [pair-3-access-gate-provider]
      summary: Lay danh sach lich su quet the gan day
      description: Pair 3 - Core Business goi Access Gate de lay danh sach access log gan day.
      operationId: getRecentLogs
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Danh sach log quet the
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogPage'
              examples:
                recentLogs:
                  value:
                    data:
                      - logId: log-7788
                        cardId: RFID-2026-001
                        gateId: gate-main-01
                        direction: IN
                        timestamp: '2026-05-26T08:00:00Z'
                        status: ALLOWED
                        operatorNote: none
                    nextCursor: none
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /access/logs/{logId}:
    get:
      tags: [pair-3-access-gate-provider]
      summary: Lay chi tiet mot access log
      description: Pair 3 - Core Business goi Access Gate de xem chi tiet mot lan quet the.
      operationId: getAccessLogById
      parameters:
        - $ref: '#/components/parameters/LogId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Chi tiet access log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogItem'
              examples:
                allowedLog:
                  value:
                    logId: log-7788
                    cardId: RFID-2026-001
                    gateId: gate-main-01
                    direction: IN
                    timestamp: '2026-05-26T08:00:00Z'
                    status: ALLOWED
                    operatorNote: none
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /gates/{gateId}/status:
    get:
      tags: [pair-3-access-gate-provider]
      summary: Lay trang thai cong
      description: Pair 3 - Core Business goi Access Gate de kiem tra cong dang online, offline hay bao tri.
      operationId: getGateStatus
      parameters:
        - $ref: '#/components/parameters/GateId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Trang thai cong
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GateStatus'
              examples:
                online:
                  value:
                    gateId: gate-main-01
                    status: ONLINE
                    lastHeartbeatAt: '2026-05-26T08:00:00Z'
                    maintenanceReason: none
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /cards/{cardId}:
    get:
      tags: [pair-3-access-gate-provider]
      summary: Lay thong tin the
      description: Pair 3 - Core Business goi Access Gate de kiem tra trang thai the RFID.
      operationId: getCardById
      parameters:
        - $ref: '#/components/parameters/CardId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Thong tin the
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
              examples:
                active:
                  value:
                    cardId: RFID-2026-001
                    holderId: student-001
                    status: ACTIVE
                    expiresAt: '2026-12-31T23:59:59Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /access/check:
    post:
      tags: [pair-10-core-business-provider]
      summary: Kiem tra quyen mo cong
      description: |
        Pair 10 - Access Gate goi Core Business ngay khi dau doc RFID nhan dien duoc the.
        Access Gate timeout sau 500ms va fail-closed neu Core Business khong phan hoi.
      operationId: checkAccessPolicy
      parameters:
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequest'
            examples:
              cardSwipe:
                value:
                  cardId: RFID-2026-001
                  gateId: gate-main-01
                  direction: IN
                  timestamp: '2026-05-26T08:00:00Z'
                  idempotencyKey: RFID-2026-001-gate-main-01-20260526080000
                  operatorNote: none
      responses:
        '200':
          description: Ket qua phe duyet mo cong. The bi khoa van tra 200 voi allow=false.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'
              examples:
                allowed:
                  value:
                    decisionId: decision-001
                    allow: true
                    reasonCode: ACCESS_ALLOWED
                    policyId: policy-001
                    expiresAt: '2026-05-26T08:05:00Z'
                    operatorNote: none
                blocked:
                  value:
                    decisionId: decision-002
                    allow: false
                    reasonCode: CARD_BLOCKED
                    policyId: policy-001
                    expiresAt: '2026-05-26T08:05:00Z'
                    operatorNote: Card is blocked by student office.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /decisions/{decisionId}:
    get:
      tags: [pair-10-core-business-provider]
      summary: Lay lai ket qua quyet dinh truy cap
      description: Pair 10 - Access Gate co the truy van lai decision da duoc Core Business tao.
      operationId: getAccessDecisionById
      parameters:
        - $ref: '#/components/parameters/DecisionId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Chi tiet access decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /policies/access/{policyId}:
    get:
      tags: [pair-10-core-business-provider]
      summary: Lay thong tin policy truy cap
      description: Pair 10 - Tra ve policy da ap dung cho access decision, ho tro oneOf va discriminator.
      operationId: getAccessPolicyById
      parameters:
        - $ref: '#/components/parameters/PolicyId'
        - $ref: '#/components/parameters/CorrelationId'
      responses:
        '200':
          description: Thong tin policy truy cap
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessPolicy'
              examples:
                timeBased:
                  value:
                    policyType: timeBased
                    policyId: policy-001
                    name: Working hours policy
                    startTime: '07:00'
                    endTime: '18:00'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: So item toi da can lay.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    Cursor:
      name: cursor
      in: query
      required: false
      description: Cursor de lay trang tiep theo.
      schema:
        type: string
        minLength: 1
        maxLength: 200
    CorrelationId:
      name: X-Correlation-Id
      in: header
      required: false
      description: Ma truy vet request giua cac service.
      schema:
        type: string
        minLength: 8
        maxLength: 100
    LogId:
      name: logId
      in: path
      required: true
      schema:
        type: string
        pattern: '^log-[0-9]{3,}$'
      example: log-7788
    CardId:
      name: cardId
      in: path
      required: true
      schema:
        type: string
        pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
      example: RFID-2026-001
    GateId:
      name: gateId
      in: path
      required: true
      schema:
        type: string
        pattern: '^gate-[a-z0-9-]+$'
      example: gate-main-01
    DecisionId:
      name: decisionId
      in: path
      required: true
      schema:
        type: string
        pattern: '^decision-[0-9]{3,}$'
      example: decision-001
    PolicyId:
      name: policyId
      in: path
      required: true
      schema:
        type: string
        pattern: '^policy-[0-9]{3,}$'
      example: policy-001
  schemas:
    HealthStatus:
      type: object
      additionalProperties: false
      required: [status, service, time]
      properties:
        status:
          type: string
          enum: [ok]
          example: ok
        service:
          type: string
          example: access-gate-integration
        time:
          type: string
          format: date-time
          example: '2026-05-26T08:00:00Z'
    AccessLogPage:
      type: object
      additionalProperties: false
      required: [data, nextCursor]
      properties:
        data:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/AccessLogItem'
        nextCursor:
          type: [string, 'null']
          example: none
    AccessLogItem:
      type: object
      additionalProperties: false
      required: [logId, cardId, gateId, direction, timestamp, status, operatorNote]
      properties:
        logId:
          type: string
          example: log-7788
        cardId:
          type: string
          example: RFID-2026-001
        gateId:
          type: string
          example: gate-main-01
        direction:
          type: string
          enum: [IN, OUT]
          example: IN
        timestamp:
          type: string
          format: date-time
          example: '2026-05-26T08:00:00Z'
        status:
          type: string
          enum: [ALLOWED, DENIED, ERROR]
          example: ALLOWED
        operatorNote:
          type: [string, 'null']
          maxLength: 300
          example: none
    GateStatus:
      type: object
      additionalProperties: false
      required: [gateId, status, lastHeartbeatAt, maintenanceReason]
      properties:
        gateId:
          type: string
          example: gate-main-01
        status:
          type: string
          enum: [ONLINE, OFFLINE, MAINTENANCE]
          example: ONLINE
        lastHeartbeatAt:
          type: string
          format: date-time
          example: '2026-05-26T08:00:00Z'
        maintenanceReason:
          type: [string, 'null']
          maxLength: 300
          example: none
    Card:
      type: object
      additionalProperties: false
      required: [cardId, holderId, status, expiresAt]
      properties:
        cardId:
          type: string
          example: RFID-2026-001
        holderId:
          type: string
          example: student-001
        status:
          type: string
          enum: [ACTIVE, BLOCKED, EXPIRED]
          example: ACTIVE
        expiresAt:
          type: string
          format: date-time
          example: '2026-12-31T23:59:59Z'
    AccessRequest:
      type: object
      additionalProperties: false
      required: [cardId, gateId, direction, timestamp, idempotencyKey, operatorNote]
      properties:
        cardId:
          type: string
          pattern: '^RFID-[0-9]{4}-[0-9]{3}$'
          example: RFID-2026-001
        gateId:
          type: string
          pattern: '^gate-[a-z0-9-]+$'
          example: gate-main-01
        direction:
          type: string
          enum: [IN, OUT]
          example: IN
        timestamp:
          type: string
          format: date-time
          example: '2026-05-26T08:00:00Z'
        idempotencyKey:
          type: string
          minLength: 10
          maxLength: 160
          example: RFID-2026-001-gate-main-01-20260526080000
        operatorNote:
          type: [string, 'null']
          maxLength: 300
          example: none
    AccessDecision:
      type: object
      additionalProperties: false
      required: [decisionId, allow, reasonCode, policyId, expiresAt, operatorNote]
      properties:
        decisionId:
          type: string
          example: decision-001
        allow:
          type: boolean
          example: true
        reasonCode:
          type: string
          enum: [ACCESS_ALLOWED, CARD_BLOCKED, CARD_EXPIRED, OUTSIDE_TIME_WINDOW, ROLE_NOT_ALLOWED, POLICY_NOT_FOUND, SYSTEM_ERROR]
          example: ACCESS_ALLOWED
        policyId:
          type: string
          example: policy-001
        expiresAt:
          type: string
          format: date-time
          example: '2026-05-26T08:05:00Z'
        operatorNote:
          type: [string, 'null']
          maxLength: 300
          example: none
    AccessPolicy:
      type: object
      oneOf:
        - $ref: '#/components/schemas/TimeBasedPolicy'
        - $ref: '#/components/schemas/RoleBasedPolicy'
      discriminator:
        propertyName: policyType
        mapping:
          timeBased: '#/components/schemas/TimeBasedPolicy'
          roleBased: '#/components/schemas/RoleBasedPolicy'
    TimeBasedPolicy:
      type: object
      additionalProperties: false
      required: [policyType, policyId, name, startTime, endTime]
      properties:
        policyType:
          type: string
          enum: [timeBased]
          example: timeBased
        policyId:
          type: string
          example: policy-001
        name:
          type: string
          example: Working hours policy
        startTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '07:00'
        endTime:
          type: string
          pattern: '^([01][0-9]|2[0-3]):[0-5][0-9]$'
          example: '18:00'
    RoleBasedPolicy:
      type: object
      additionalProperties: false
      required: [policyType, policyId, name, allowedRoles]
      properties:
        policyType:
          type: string
          enum: [roleBased]
          example: roleBased
        policyId:
          type: string
          example: policy-002
        name:
          type: string
          example: Staff only policy
        allowedRoles:
          type: array
          minItems: 1
          items:
            type: string
            enum: [STUDENT, LECTURER, STAFF, SECURITY]
          example: [LECTURER, STAFF]
    Problem:
      type: object
      additionalProperties: false
      required: [type, title, status, detail, instance, correlationId]
      properties:
        type:
          type: string
          format: uri
          example: https://campus.local/errors/validation
        title:
          type: string
          example: Invalid request
        status:
          type: integer
          minimum: 400
          maximum: 599
          example: 400
        detail:
          type: string
          example: cardId is required.
        instance:
          type: string
          format: uri-reference
          example: /access/check
        correlationId:
          type: string
          example: corr-20260526-0001
  responses:
    BadRequest:
      description: Request sai cau truc hoac sai tham so
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Thieu hoac sai Bearer token
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Khong co quyen truy cap resource
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    NotFound:
      description: Resource khong ton tai
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: Trung idempotencyKey hoac xung dot nghiep vu
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    InternalServerError:
      description: Loi server
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'





