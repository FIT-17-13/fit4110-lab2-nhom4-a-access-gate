openapi: 3.1.0
info:
  title: Smart Campus - API Kiểm Soát Cổng Ra Vào (Access Gate)
  version: 1.0.0
  description: Tài liệu đặc tả hợp đồng API đồng bộ (REST) phục vụ quản lý và giám sát các cổng kiểm soát ra vào tích hợp AI trong khuôn viên Smart Campus.
  contact:
    name: "Nhóm 4 - Access Gate"
    email: "nhom4.accessgate@dainam.edu.vn"

servers:
  - url: http://localhost:4010
    description: Mock Server chạy bằng Prism cục bộ

tags:
  - name: Access Gate
    description: Các API phục vụ quản lý thiết bị cổng, xử lý quẹt thẻ và giám sát trạng thái an ninh của cổng.

paths:
  # === PATH 1: Lấy danh sách lịch sử quẹt thẻ qua cổng (Có hỗ trợ phân trang) ===
  /api/v1/access-logs:
    get:
      summary: Lấy danh sách lịch sử ra vào qua cổng
      operationId: getAccessLogs
      description: "Truy xuất danh sách toàn bộ lịch sử quẹt thẻ và quét khuôn mặt tại các cổng kiểm soát, hỗ trợ phân trang dữ liệu."
      tags:
        - Access Gate
      parameters:
        - name: page
          in: query
          required: false
          description: Số trang hiện tại cần lấy dữ liệu
          schema:
            type: integer
            default: 1
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Truy xuất danh sách lịch sử thành công
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessLogResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'

  # === PATH 2: Gửi sự kiện quẹt thẻ từ thiết bị ngoại vi ===
  /api/v1/access-logs/verify:
    post:
      summary: Xác thực quyền ra vào từ thiết bị cổng
      operationId: verifyAccessEvent
      description: "Nhận dữ liệu quét (Thẻ sinh viên hoặc Khuôn mặt) gửi từ thiết bị cổng vật lý để kiểm tra quyền truy cập hệ thống."
      tags:
        - Access Gate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessVerificationRequest'
      responses:
        '201':
          description: Xác thực hoàn tất và ghi nhận lượt ra vào thành công
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogResponse'
        '400':
          $ref: '#/components/responses/400BadRequest'

  # === PATH 3: Tra cứu chi tiết một lượt ra vào cụ thể ===
  /api/v1/access-logs/{id}:
    get:
      summary: Xem chi tiết một lượt ra vào
      operationId: getAccessLogById
      description: "Tra cứu thông tin chi tiết của một bản ghi lịch sử truy cập thông qua ID định danh duy nhất."
      tags:
        - Access Gate
      parameters:
        - name: id
          in: path
          required: true
          description: Mã ID định danh duy nhất của bản ghi lịch sử ra vào
          schema:
            type: string
            example: "log-access-888"
      responses:
        '200':
          description: Tìm thấy thông tin lịch sử ra vào
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessLogResponse'
              examples:
                allowed:
                  value:
                    id: "log-001"
                    timestamp: "2026-05-15T08:00:00Z"
                    status: "ALLOWED"
                    verification_details:
                      method_type: "CARD"
                      card_uid: "UID-88-AA-BB-CC"
                      student_id: "DNU-22104055"
                denied:
                  value:
                    id: "log-045"
                    timestamp: "2026-05-15T10:42:00Z"
                    status: "DENIED"
                    verification_details:
                      method_type: "FACE"
                      face_id: "FACE-ID-9912"
                      confidence_score: 0.45
        '401':
          $ref: '#/components/responses/401Unauthorized'
        '403':
          $ref: '#/components/responses/403Forbidden'
        '404':
          $ref: '#/components/responses/404NotFound'

  # === PATH 4: Điều khiển đóng/mở khóa cổng khẩn cấp ===
  /api/v1/gates/{gateId}/control:
    put:
      summary: Điều khiển trạng thái khóa cổng khẩn cấp
      operationId: controlGateState
      description: "Gửi lệnh cưỡng bức thay đổi trạng thái hoạt động của cổng (Ví dụ: Mở khóa toàn bộ khi có hỏa hoạn hoặc Khóa chặt khi có xâm nhập trái phép)."
      tags:
        - Access Gate
      parameters:
        - name: gateId
          in: path
          required: true
          description: Mã định danh của thiết bị cổng vật lý
          schema:
            type: string
            example: "GATE-MAIN-01"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                command:
                  type: string
                  enum: [FORCE_OPEN, FORCE_LOCK, RESUME_NORMAL]
                  example: "FORCE_OPEN"
              required: [command]
      responses:
        '200':
          description: Gửi lệnh điều khiển thiết bị thành công
        '400':
          $ref: '#/components/responses/400BadRequest'
        '404':
          $ref: '#/components/responses/404NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      name: limit
      in: query
      required: false
      description: Maximum number of logs returned.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      example: 20

  responses:
    400BadRequest:
      description: Yêu cầu dữ liệu không hợp lệ (Cấu trúc Problem Details chuẩn RFC 7807)
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    401Unauthorized:
      description: Không có quyền truy cập hệ thống
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    403Forbidden:
      description: Bị từ chối truy cập tài nguyên
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    404NotFound:
      description: Không tìm thấy tài nguyên yêu cầu trên hệ thống
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    # 1. Tiêu chí: Khai báo dữ liệu đầu vào sử dụng Union type với "null" ở trường snapshot_url
    AccessVerificationRequest:
      type: object
      required: [gate_id, auth_type]
      properties:
        gate_id:
          type: string
          example: "GATE-MAIN-01"
        auth_type:
          type: string
          example: "CARD"
        snapshot_url:
          type: [string, "null"] # Đặc quyền OpenAPI 3.1.0, cho phép null nếu camera bị hỏng/che khuất
          example: null

    # 2. Tiêu chí: Thiết kế Đa hình phức tạp sử dụng kết hợp một cặp "oneOf" và "discriminator"
    AccessLogResponse:
      type: object
      required: [id, timestamp, status, verification_details]
      properties:
        id:
          type: string
          example: "log-access-101"
        timestamp:
          type: string
          format: date-time
          example: "2026-05-19T18:00:00Z"
        status:
          type: string
          enum: [ALLOWED, DENIED]
          example: "ALLOWED"
        verification_details:
          type: object
          discriminator:
            propertyName: method_type
          oneOf:
            - $ref: '#/components/schemas/CardVerification'
            - $ref: '#/components/schemas/FaceVerification'

    CardVerification:
      type: object
      required: [method_type, card_uid, student_id]
      properties:
        method_type:
          type: string
          example: "CARD"
        card_uid:
          type: string
          example: "UID-88-AA-BB-CC"
        student_id:
          type: string
          example: "DNU-22104055"

    FaceVerification:
      type: object
      required: [method_type, face_id, confidence_score]
      properties:
        method_type:
          type: string
          example: "FACE"
        face_id:
          type: string
          example: "FACE-ID-9912"
        confidence_score:
          type: number
          minimum: 0
          maximum: 1
          example: 0.98

    # 3. Tiêu chí: Cấu trúc lỗi đồng nhất chuẩn RFC 7807 Problem Details
    ProblemDetails:
      type: object
      required: [type, title, status, detail]
      properties:
        type:
          type: string
          format: uri
          example: "https://dainam.edu.vn/probs/bad-request"
        title:
          type: string
          example: "Invalid Request Schema"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Cấu trúc JSON gửi lên máy chủ bị thiếu trường bắt buộc 'gate_id'."
        instance:
          type: string
          format: uri
          example: "https://smartcampus.example/api/v1/access-logs/verify"